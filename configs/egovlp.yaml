fps: 30
force_yes: false
io:
  filter_completed: true
  video_dir_path: /inputs/videos
  ego4d_download_dir: /inputs
  uid_list: null
  video_limit: -1
  out_path: /features/egovlp
  debug_path: /debug
  debug_mode: false
  exclude_no_audio: false
inference_config:
  device: cuda
  batch_size: 128
  num_workers: 8
  prefetch_factor: 2
  fps: 30
  frame_window: 32
  stride: 16
  include_audio: false
  include_video: true
  norm_config:
    normalize_audio: false
    resample_audio_rate: 16000
    resampling_method: "sinc_interpolation"
schedule_config:
  run_locally: true
  log_folder: slurm_log/%j
  timeout_min: 3200
  constraint: volta
  slurm_partition: pixar
  slurm_array_parallelism: 128
  gpus_per_node: 1
  cpus_per_task: 10
  overhead: 1.1
  time_per_forward_pass: 2.4
  schedule_time_per_node: 10.0
model_config:
  side_size: 224
  crop_size: 224
  dilation: 8
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
  crop: three_crops
  mirror: true
model_module_str: models.egovlp
